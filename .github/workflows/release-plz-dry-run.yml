name: Release Dry-Run

on:
  workflow_call:
    inputs:
      runner:
        description: 'Runner label JSON'
        type: string
        default: '"ubuntu-latest"'
      cargo-build-jobs:
        description: "Parallel cargo build jobs"
        type: string
        default: "1"

jobs:
  release-dry-run:
    name: Release Dry-Run Check
    runs-on: ${{ fromJSON(inputs.runner || '"ubuntu-latest"') }}
    timeout-minutes: 30
    steps:
      - name: Free Disk Space
        if: ${{ !contains(inputs.runner || '', 'self-hosted') }}
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup branch tracking for release-plz
        run: |
          git checkout -B dry-run-check
          git branch --set-upstream-to=origin/main dry-run-check

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Setup protoc
        uses: ./.github/actions/setup-protoc

      - name: Install GitHub CLI (required by release-plz action)
        if: ${{ contains(inputs.runner || '', 'self-hosted') }}
        run: |
          if ! command -v gh &>/dev/null; then
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
              | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
              | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt-get update -qq
            sudo apt-get install -y gh
          fi

      - name: Install release-plz
        uses: taiki-e/install-action@v2
        with:
          tool: release-plz

      # Run release-plz release --dry-run with error filtering.
      # cargo publish --dry-run resolves dependencies against crates.io, but
      # workspace crates with pre-release interdependencies fail because
      # upstream crates are only dry-run published (not actually on crates.io).
      # ^0.1.0-rc.5 does NOT match 0.1.0-rc.4 in Cargo's pre-release semver.
      # The actual release process publishes in dependency order, avoiding this.
      # See: #2079
      - name: Run release-plz release (dry-run)
        run: |
          set +e
          release-plz release --dry-run 2>&1 | tee /tmp/release-dry-run.log
          exit_code=$?
          set -e

          if [ $exit_code -eq 0 ]; then
            echo "Release dry-run succeeded"
            exit 0
          fi

          # Check if all errors are the known workspace pre-release dependency issue
          if grep -q "failed to select a version for the requirement" /tmp/release-dry-run.log; then
            # Extract the failing requirements
            grep "failed to select a version" /tmp/release-dry-run.log | while IFS= read -r line; do
              echo "::warning::$line"
            done
            echo ""
            echo "::warning::Release dry-run failed due to known limitation: cargo publish --dry-run cannot resolve workspace pre-release interdependencies (see #2079)"
            echo "The actual release process publishes crates in dependency order, resolving this issue."
            exit 0
          fi

          # Unknown error - fail the check
          echo "::error::Release dry-run failed with unexpected error"
          exit $exit_code
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
